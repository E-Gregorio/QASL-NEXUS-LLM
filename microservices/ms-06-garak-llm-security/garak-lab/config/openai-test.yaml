# Configuracion Garak para testear modelos OpenAI
# Uso: garak --config config/openai-test.yaml

plugins:
  target_type: openai
  target_name: gpt-3.5-turbo
  probe_spec: encoding.InjectBase64,dan.DanJailbreak

run:
  generations: 3
  seed: 42

system:
  verbose: 1
  parallel_requests: false
  parallel_attempts: false
