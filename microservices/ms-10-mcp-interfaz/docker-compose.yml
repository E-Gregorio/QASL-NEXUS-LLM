version: '3.8'

services:
  mcp-interfaz:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: qasl-mcp-interfaz
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      DB_HOST: qasl-nexus-db
      MS01_URL: http://qasl-metodologias:3000
      MS09_URL: http://qasl-orquestador-llm:8000
    networks:
      - qasl-network

networks:
  qasl-network:
    name: qasl-nexus-network
    external: true
