apiVersion: 1

datasources:
  # ============================================
  # PROMETHEUS (Backend APIs)
  # ============================================
  - name: Prometheus
    type: prometheus
    uid: prometheus
    url: http://prometheus:9090
    access: proxy
    isDefault: false
    editable: false
    jsonData:
      timeInterval: "15s"
      queryTimeout: "60s"
      httpMethod: "POST"

  # ============================================
  # INFLUXDB (Frontend DOM + Security)
  # ============================================
  - name: InfluxDB-Sentinel
    type: influxdb
    uid: InfluxDB-Sentinel
    url: http://influxdb:8086
    access: proxy
    isDefault: false
    editable: false
    jsonData:
      version: Flux
      organization: qasl
      defaultBucket: sentinel_metrics
      tlsSkipVerify: true
    secureJsonData:
      token: qasl-sentinel-token-2024

  # ============================================
  # INFLUXDB - QASL-MOBILE (Testing Mobile)
  # ============================================
  - name: InfluxDB-Mobile
    type: influxdb
    uid: InfluxDB-Mobile
    url: http://host.docker.internal:8089
    access: proxy
    isDefault: false
    editable: false
    database: qasl_mobile
