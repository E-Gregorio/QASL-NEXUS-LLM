global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'api-sentinel'
    static_configs:
      - targets: ['host.docker.internal:9091']
        labels:
          environment: 'test'
          project: 'sigma'

  - job_name: 'sentinel-metrics-unified'
    static_configs:
      - targets: ['host.docker.internal:9097']
        labels:
          environment: 'test'
          project: 'unified'

  - job_name: 'pushgateway'
    honor_labels: true
    static_configs:
      - targets: ['pushgateway:9091']

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
