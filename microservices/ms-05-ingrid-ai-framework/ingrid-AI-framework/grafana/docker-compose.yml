# Docker Compose para INGRID Grafana Stack

services:
  # ═══════════════════════════════════════════════════════════════
  # PROMETHEUS - Almacena métricas
  # ═══════════════════════════════════════════════════════════════
  prometheus:
    image: prom/prometheus:latest
    container_name: ingrid-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    restart: unless-stopped

  # ═══════════════════════════════════════════════════════════════
  # PUSHGATEWAY - Recibe métricas push
  # ═══════════════════════════════════════════════════════════════
  pushgateway:
    image: prom/pushgateway:latest
    container_name: ingrid-pushgateway
    ports:
      - "9091:9091"
    restart: unless-stopped

  # ═══════════════════════════════════════════════════════════════
  # GRAFANA - Visualización
  # ═══════════════════════════════════════════════════════════════
  grafana:
    image: grafana/grafana:latest
    container_name: ingrid-grafana
    ports:
      - "3002:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./dashboard.json:/var/lib/grafana/dashboards/ai-testing.json
      - ./provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:

networks:
  default:
    name: ai-testing-network
