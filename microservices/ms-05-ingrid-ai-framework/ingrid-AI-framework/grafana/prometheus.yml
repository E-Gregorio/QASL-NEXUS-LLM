# ═══════════════════════════════════════════════════════════════
# INGRID - AI TESTING FRAMEWORK
# Prometheus Configuration
# ═══════════════════════════════════════════════════════════════

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'ingrid-monitor'

# Alertmanager configuration (opcional)
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# Rule files (opcional)
rule_files: []

# Scrape configurations
scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Pushgateway - recibe métricas de INGRID
  - job_name: 'pushgateway'
    honor_labels: true
    static_configs:
      - targets: ['pushgateway:9091']

  # Node Exporter (opcional - métricas del sistema)
  # - job_name: 'node'
  #   static_configs:
  #     - targets: ['node-exporter:9100']
